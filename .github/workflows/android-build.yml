name: Build Android APK

# Produces the runnable Tower Swipe Defense APK. The agent sandbox cannot
# reach Google's Maven/SDK servers, so the binary is built here in CI where
# that access is available, then published as a downloadable artifact (and a
# release on tags).

on:
  push:
    branches: ['**']
    paths:
      - 'app/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch: {}
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Sync Capacitor → Android
        run: npx cap sync android

      - name: Build debug APK
        working-directory: app/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk tower-swipe-defense-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tower-swipe-defense-apk
          path: app/tower-swipe-defense-debug.apk
          if-no-files-found: error

      - name: Attach APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: app/tower-swipe-defense-debug.apk
